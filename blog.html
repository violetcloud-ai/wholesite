<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Title</title>
    
    <link rel="stylesheet" href="assets/general-style.css">
    <link rel="stylesheet" href="assets/blog-style.css">
</head>
<body>

    <!-- Main content wrapper to push footer down -->
    <div class="content-wrapper">
        <header class="sticky-header" id="header">
            <div class="nav-container">
                <!-- Left: Brand Assets -->
                <a href="index.html" class="brand">
                    <img src="assets/img/logo1.jpg" alt="Logo" class="logo-img">
                    <span class="brand-name">Company Name</span>
                </a>              

                <!-- Right: Navigation Menu -->
                <nav>
                    <button class="hamburger" aria-label="Toggle navigation" id="hamburger-btn">
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                    </button>

                    <ul class="nav-menu" id="nav-menu">
                        <!-- About Dropdown Parent -->
                        <li class="dropdown">
                            <a href="#" class="nav-link">About <span class="arrow"></span></a>
                            <ul class="submenu">
                                <li><a href="#">Company</a></li>
                                <li><a href="#">Services</a></li>
                            </ul>
                        </li>
                        
                        <!-- Projects Dropdown Parent -->
                        <li class="dropdown">
                            <a href="#" class="nav-link">Projects <span class="arrow"></span></a>
                            <ul class="submenu">
                                <li><a href="simulator.html">Building Simulator</a></li>
                                <li><a href="#">Gallery</a></li>
                            </ul>
                        </li>
                        
                        <li><a href="blog.html" class="nav-link">Blog</a></li>
                        <li><a href="contact.html" class="nav-link">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <!-- Two-column grid container -->
            <div class="blog-layout-grid">
                
                <!-- Left Side: Main Blog Posts Feed -->
                <section class="blog-posts-feed">
                    <!-- JavaScript will dynamically inject all posts right here -->
                    <!-- Bottom Scroll/Loading Prompt Indicator -->
                    <div class="read-more-trigger">
                        <button id="load-more-btn">Read More</button>
                    </div>
                </section>

                <!-- Right Side: Sidebar Archive Panel -->
                <aside class="blog-sidebar">
    
                    <!-- 1. Search Bar Widget Container -->
                    <div class="sidebar-widget search-widget">
                        <!-- New: Clickable header button that acts as a mobile expander toggle -->
                        <button class="sidebar-toggle-btn" id="toggle-search-btn">
                            <h3>Search Articles</h3>
                            <span class="toggle-icon">+</span>
                        </button>
                        <div class="widget-content-wrapper" id="search-widget-content">
                            <div class="search-box-wrapper">
                                <input type="text" id="blog-search-input" placeholder="Type keywords, tags...">
                                <button id="clear-search-btn" title="Clear Search">&times;</button>
                            </div>
                            <div id="active-filters-bar"></div>
                        </div>
                    </div>

                    <!-- 2. Existing Archive Widget Container -->
                    <div class="sidebar-widget">
                        <!-- New: Clickable header button that acts as a mobile expander toggle -->
                        <button class="sidebar-toggle-btn" id="toggle-archive-btn">
                            <h3>Blog Archive</h3>
                            <span class="toggle-icon">+</span>
                        </button>
                        <div class="widget-content-wrapper" id="archive-widget-content">
                            <ul class="archive-list" id="dynamic-archive-list">
                                <!-- Dynamic links will generate here automatically -->
                            </ul>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <footer class="site-footer">
        <p>&copy; 2026 Company Name. All rights reserved.</p>
    </footer>

    <script src="assets/menu-style.js"></script>
    <script src="assets/blog-data.js"></script>
    <script src="assets/blog-events.js"></script>

</body>
</html>
